name: CI / Release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # ── Release (tags only) ─────────────────────────────────────────────────────
  release:
    name: Release
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create GitHub releases

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed for --generate-notes changelog

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            echo "Building linux/$arch …"
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
              go build \
                -trimpath \
                -ldflags="-s -w" \
                -o "dist/neteye-center-linux-${arch}" \
                ./cmd/center
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          echo "── SHA256SUMS ──"
          cat SHA256SUMS

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "neteye-center ${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            dist/neteye-center-linux-amd64 \
            dist/neteye-center-linux-arm64 \
            dist/SHA256SUMS
